name: Newsletter — Nouvel article

on:
  push:
    branches: [main]
    paths:
      - 'app/posts/*.md'

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Détecter les nouveaux articles
        id: detect
        run: |
          NEW=$(git diff --name-only --diff-filter=A ${{ github.event.before }} ${{ github.sha }} -- 'app/posts/*.md')
          if [ -n "$NEW" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            {
              echo "files<<EOF"
              echo "$NEW"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Envoyer la newsletter
        if: steps.detect.outputs.found == 'true'
        run: node scripts/send-newsletter-on-publish.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          NEW_ARTICLE_FILES: ${{ steps.detect.outputs.files }}
