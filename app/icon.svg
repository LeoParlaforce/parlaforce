<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0d0d0d"/>

  <!-- Blade (tapers to a point at top) -->
  <polygon points="16,2 13.5,17 18.5,17" fill="#e0e0e0"/>
  <!-- Fuller (central groove / highlight) -->
  <polygon points="16,2 15.5,17 16.5,17" fill="#f8f8f8"/>

  <!-- Crossguard / quillon -->
  <rect x="6" y="17" width="20" height="2.5" rx="1.2" fill="#cccccc"/>

  <!-- Grip -->
  <rect x="14.5" y="19.5" width="3" height="7" rx="0.5" fill="#aaaaaa"/>
  <!-- Grip binding wraps -->
  <rect x="14.5" y="21.5" width="3" height="0.8" fill="#0d0d0d55"/>
  <rect x="14.5" y="23.5" width="3" height="0.8" fill="#0d0d0d55"/>
  <rect x="14.5" y="25.5" width="3" height="0.8" fill="#0d0d0d55"/>

  <!-- Pommel -->
  <ellipse cx="16" cy="29.5" rx="3" ry="2" fill="#c4c4c4"/>
</svg>
